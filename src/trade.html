<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Trading Journal - Nuevo Trade</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --green: #22c55e;
        --red: #ef4444;
        --border: #334155;
        --font-xs: 11px;
        --font-sm: 12px;
        --font-md: 14px;
        --font-lg: 16px;
        --font-xl: 20px;
        --fw-regular: 400;
        --fw-medium: 500;
        --fw-semibold: 600;
        --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
        --shadow-sm: 0 2px 6px rgba(0,0,0,0.06);
        --shadow-md: 0 6px 16px rgba(0,0,0,0.08);
        --shadow-lg: 0 12px 28px rgba(0,0,0,0.12);
        --space-xs: 8px;
        --space-sm: 12px;
        --space-md: 16px;
        --space-lg: 24px;
        --space-xl: 32px;
        --sidebar-width: 260px;
        --sidebar-collapsed-width: 76px;
        --page-padding-x: 28px;
        --page-padding-y: 24px;
        --page-gap: 24px;
        --card-gap: 20px;
      }
      body.dark {
        --text: #e5e7eb;
        --muted: #9ca3af;
        --shadow-xs: 0 2px 6px rgba(0,0,0,0.3);
        --shadow-sm: 0 6px 18px rgba(0,0,0,0.35);
        --shadow-md: 0 10px 30px rgba(0,0,0,0.45);
        --shadow-lg: 0 20px 50px rgba(0,0,0,0.6);
      }
      body.light {
        --bg: #f6f8fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: rgba(0,0,0,0.08);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }
      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        overflow-x: hidden;
      }
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 30;
        width: var(--sidebar-width);
        min-width: var(--sidebar-collapsed-width);
        height: 100vh;
        background: #0b1220;
        border-right: 1px solid var(--border);
        padding: 20px 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-sizing: border-box;
        transition: width 0.25s ease, padding 0.25s ease;
      }
      .sidebar.closed,
      .sidebar.collapsed {
        width: var(--sidebar-collapsed-width);
        min-width: var(--sidebar-collapsed-width);
        overflow: hidden;
      }
      .sidebar.closed h2 {
        font-size: 0;
        margin: 0;
      }
      .sidebar.closed .sidebar-btn {
        font-size: 0;
        padding: 10px 8px;
      }
      .sidebar h2 {
        margin: 0 0 8px 0;
        font-size: 1.2rem;
      }
      .sidebar-btn {
        border: 1px solid var(--border);
        background: #162336;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 600;
        text-align: left;
        transition: background 0.2s ease, border-color 0.2s ease;
      }
      .sidebar-btn:hover {
        background: #1c2b42;
      }
      .sidebar-btn.active {
        border-color: #60a5fa;
        box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
      }
      .sidebar-btn svg {
        width: 18px;
        height: 18px;
        margin-right: 8px;
        opacity: 0.7;
      }
      .sidebar-btn.active svg {
        opacity: 1;
        stroke: var(--green);
      }
      .main-content {
        margin-left: var(--sidebar-width);
        width: calc(100vw - var(--sidebar-width));
        max-width: none;
        min-height: 100vh;
        padding: var(--page-padding-y) var(--page-padding-x);
        overflow-y: auto;
        overflow-x: hidden;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: var(--page-gap);
        transition: margin-left 0.25s ease, width 0.25s ease;
      }
      .sidebar.collapsed + .main-content,
      .sidebar.closed + .main-content,
      .sidebar.collapsed ~ .main-content,
      .sidebar.closed ~ .main-content {
        margin-left: var(--sidebar-collapsed-width);
        width: calc(100vw - var(--sidebar-collapsed-width));
      }
      .toggle-sidebar {
        border: 1px solid var(--border);
        background: #162336;
        color: var(--text);
        border-radius: 10px;
        padding: 8px 10px;
        cursor: pointer;
        margin-bottom: 6px;
        font-weight: 700;
      }
      .container,
      .page-container,
      .view,
      #configView,
      #tradeView,
      .stats-page {
        width: 100%;
        max-width: none;
        box-sizing: border-box;
      }
      .container {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: var(--page-gap);
      }
      #tradeView {
        display: flex;
        flex-direction: column;
        gap: var(--page-gap);
      }
      .card,
      .dashboard-card,
      .settings-card,
      .panel-card {
        width: 100%;
        max-width: none;
        margin: 0;
        box-sizing: border-box;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: var(--space-md);
        box-shadow: var(--shadow-xs);
      }
      .dashboard-grid,
      .stats-grid,
      .chart-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
        width: 100%;
      }
      .card:hover { box-shadow:var(--shadow-sm); }
      body.light .card { background:#ffffff; border:1px solid rgba(0,0,0,0.06); }
      .section-title { margin:0 0 10px 0; font-size:var(--font-md); font-weight:var(--fw-semibold); }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(260px, 1fr));
        gap: 16px;
        width: 100%;
      }
      .field { display:flex; flex-direction:column; gap:6px; }
      .field-full { grid-column:1 / -1; }
      label { font-size:var(--font-sm); color:var(--muted); }
      .input { width:100%; border:1px solid var(--border); border-radius:10px; background:#0b1220; color:var(--text); padding:10px 12px; font-size:var(--font-md); outline:none; }
      .button { border:none; border-radius:10px; padding:10px 14px; font-weight:600; cursor:pointer; color:#fff; }
      .button-save { background:var(--green); width:100%; margin-top:6px; padding:12px 14px; font-size:1rem; }
      .label { font-size:var(--font-sm); color:var(--muted); }
      .value-small { font-size:13px; font-weight:var(--fw-medium); }
      .title-with-icon { display:flex; align-items:center; gap:8px; }
      .title-with-icon svg { width:18px; height:18px; stroke-width:2; opacity:0.8; }
      body.light .title-with-icon svg { opacity:0.7; }
      .card * { line-height:1.4; }
      .pro-only { display:none; }
      .trade-profit { color:var(--green); }
      .trade-loss { color:var(--red); }
      .trade-be { color:var(--muted); }
      .image-preview { margin-top:8px; max-width:140px; max-height:90px; border-radius:8px; border:1px solid var(--border); object-fit:cover; display:none; }
      @media (max-width: 900px) {
        :root {
          --page-padding-x: 16px;
          --page-padding-y: 16px;
          --page-gap: 16px;
        }
        .sidebar {
          position: static;
          width: 100%;
          height: auto;
          min-height: 0;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .main-content {
          margin-left: 0;
          width: 100%;
          max-width: none;
          padding: var(--page-padding-y) var(--page-padding-x);
        }
        .sidebar.collapsed + .main-content,
        .sidebar.closed + .main-content,
        .sidebar.collapsed ~ .main-content,
        .sidebar.closed ~ .main-content {
          margin-left: 0;
          width: 100%;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="sidebar" class="sidebar open">
      <button id="toggleSidebar" class="toggle-sidebar" type="button"><i data-lucide="menu"></i></button>
      <h2>Trading Journal</h2>
      <button class="sidebar-btn" type="button"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></button>
      <button class="sidebar-btn active" type="button"><i data-lucide="plus-circle"></i><span>Nuevo Trade</span></button>
      <button class="sidebar-btn" type="button"><i data-lucide="settings"></i><span>Configuración</span></button>
    </div>

    <div class="main-content" id="tradeView">
      <div class="container">
        <section class="card">
          <h2 class="section-title title-with-icon"><i data-lucide="plus-circle"></i>Nuevo Trade</h2>
          <div class="form-grid">
            <div class="field">
              <label for="date">Fecha</label>
              <input id="date" class="input" type="date" />
            </div>
            <div class="field">
              <label for="asset">Activo</label>
              <select id="asset" class="input">
                <option value="">Selecciona un activo</option>
                <optgroup label="Forex">
                  <option value="EURUSD">EURUSD</option><option value="GBPUSD">GBPUSD</option><option value="USDJPY">USDJPY</option><option value="USDCHF">USDCHF</option><option value="AUDUSD">AUDUSD</option><option value="USDCAD">USDCAD</option><option value="NZDUSD">NZDUSD</option><option value="EURGBP">EURGBP</option><option value="EURJPY">EURJPY</option><option value="EURCHF">EURCHF</option><option value="EURAUD">EURAUD</option><option value="EURCAD">EURCAD</option><option value="EURNZD">EURNZD</option><option value="GBPJPY">GBPJPY</option><option value="GBPCHF">GBPCHF</option><option value="GBPAUD">GBPAUD</option><option value="GBPCAD">GBPCAD</option><option value="GBPNZD">GBPNZD</option><option value="AUDJPY">AUDJPY</option><option value="AUDCHF">AUDCHF</option><option value="AUDCAD">AUDCAD</option><option value="AUDNZD">AUDNZD</option><option value="CADJPY">CADJPY</option><option value="CADCHF">CADCHF</option><option value="NZDJPY">NZDJPY</option><option value="NZDCHF">NZDCHF</option>
                </optgroup>
                <optgroup label="Índices">
                  <option value="NAS100">NAS100</option><option value="SPX500">SPX500</option><option value="US30">US30</option><option value="DAX40">DAX40</option><option value="FTSE100">FTSE100</option><option value="CAC40">CAC40</option><option value="IBEX35">IBEX35</option><option value="NIKKEI225">NIKKEI225</option>
                </optgroup>
                <optgroup label="Commodities">
                  <option value="XAUUSD">XAUUSD (Gold)</option><option value="XAGUSD">XAGUSD (Silver)</option><option value="WTI">WTI</option><option value="BRENT">BRENT</option><option value="NATGAS">NATGAS</option>
                </optgroup>
              </select>
            </div>
            <div class="field">
              <label for="result">Resultado</label>
              <select id="result" class="input">
                <option value="">Selecciona resultado</option><option value="TP">TP</option><option value="SL">SL</option><option value="BE">BE</option>
              </select>
            </div>
            <div class="field">
              <label for="pnl">PnL</label>
              <input id="pnl" class="input" type="number" placeholder="PnL" />
            </div>
            <div class="field pro-only" id="lotSizeField">
              <label for="lotSize">Lotaje</label>
              <input id="lotSize" class="input" type="number" step="0.01" placeholder="Ej: 1.00" />
            </div>
            <div class="field pro-only" id="accountCapitalField">
              <label for="accountCapital">Capital cuenta (informativo)</label>
              <input id="accountCapital" class="input" type="number" step="0.01" placeholder="0.00" readonly />
            </div>
            <div class="field pro-only" id="commissionPerLotField">
              <label for="commissionPerLot">Comisión por lote</label>
              <input id="commissionPerLot" class="input" type="number" step="0.01" placeholder="0.00" readonly />
            </div>
            <div class="field pro-only" id="swapField">
              <label for="swap">Swap (opcional)</label>
              <input id="swap" class="input" type="number" step="0.01" placeholder="0.00" />
            </div>
            <div class="field pro-only field-full" id="pnlNetField">
              <label>PnL neto estimado</label>
              <input id="pnlNet" class="input" type="text" value="0.00€" readonly />
            </div>
            <div class="field pro-only field-full">
              <label>Comisión calculada</label>
              <input id="commissionValue" class="input" type="text" value="0.00€" readonly />
            </div>
            <div class="field">
              <label for="strategy">Estrategia</label>
              <select id="strategy" class="input"><option value="">Selecciona estrategia</option></select>
            </div>
            <div class="field">
              <label for="account">Cuenta</label>
              <select id="account" class="input"><option value="">Selecciona cuenta</option></select>
            </div>
            <div class="field">
              <label for="beforeImage">Imagen antes</label>
              <input id="beforeImage" class="input" type="file" accept="image/*" />
              <img id="beforeImagePreview" class="image-preview" alt="Preview antes" />
            </div>
            <div class="field">
              <label for="afterImage">Imagen después</label>
              <input id="afterImage" class="input" type="file" accept="image/*" />
              <img id="afterImagePreview" class="image-preview" alt="Preview después" />
            </div>
            <div class="field field-full">
              <button id="saveTradeBtn" class="button button-save" type="button">Guardar</button>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>window.addEventListener('DOMContentLoaded', () => { window.lucide?.createIcons(); });</script>
    <script src="./renderer.js"></script>
  </body>
</html>
